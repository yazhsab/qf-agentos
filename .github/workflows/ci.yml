name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check, test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check --output-format=github .

      - name: Mypy (strict)
        run: mypy

      - name: Tests + coverage
        run: pytest --cov=qf_agentos --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    name: Build & verify distribution
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Verify data files are packaged
        run: |
          python - <<'PY'
          import glob, zipfile, sys
          whl = sorted(glob.glob("dist/*.whl"))[-1]
          names = zipfile.ZipFile(whl).namelist()
          required = ["qf_agentos/py.typed",
                      "qf_agentos/skills/collateral_optimizer/skill.yaml"]
          missing = [r for r in required if r not in names]
          if missing:
              print("Missing from wheel:", missing); sys.exit(1)
          print("Wheel OK:", whl)
          PY
      - name: Smoke-test installed CLI
        run: |
          python -m pip install dist/*.whl
          qf-agent version
          qf-agent skills

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t qf-agentos:ci .
      - name: Smoke-test image
        run: docker run --rm qf-agentos:ci qf-agent version
